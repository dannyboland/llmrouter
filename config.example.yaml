listen: "127.0.0.1:4000"

# Providers: where to send requests
providers:
  - name: openai
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"

  - name: groq
    base_url: "https://api.groq.com/openai/v1"
    api_key: "${GROQ_API_KEY}"

  - name: local-vllm
    base_url: "http://localhost:8000/v1"

  # Vertex AI via GKE Workload Identity (no API key needed)
  - name: vertex
    vertex_ai:
      project_id: my-gcp-project
      location: us-central1

  # Azure OpenAI (api-key header, deployment-based URL)
  - name: azure
    azure_openai:
      resource_name: my-resource
      api_version: "2024-10-21"
    api_key: "${AZURE_OPENAI_KEY}"

  # Google AI Studio (API key as query parameter)
  - name: gemini
    google_ai:
      api_version: v1beta       # optional, defaults to v1beta
    api_key: "${GEMINI_API_KEY}"

  # Anthropic (OpenAI compatibility endpoint)
  - name: anthropic
    anthropic:
      version: "2023-06-01"     # optional, defaults to 2023-06-01
    api_key: "${ANTHROPIC_API_KEY}"

# Model map: aliases the client uses → provider+model candidates
models:
  fast:
    - provider: groq
      model: llama-3.3-70b-versatile
    - provider: openai
      model: gpt-4o-mini

  smart:
    - provider: openai
      model: gpt-4.1
    - provider: vertex
      model: gemini-2.5-flash
    - provider: azure
      model: gpt-4o           # deployment name in Azure
    - provider: anthropic
      model: claude-sonnet-4-20250514
    - provider: local-vllm
      model: qwen3-32b

  code:
    - provider: openai
      model: gpt-4.1
    - provider: groq
      model: llama-3.3-70b-versatile
    - provider: local-vllm
      model: qwen-coder-32b

routing:
  ewma_alpha: 0.3          # EWMA smoothing factor (higher = more reactive)
  explore_ratio: 0.2       # fraction of traffic sent to cold candidates for latency exploration
  error_threshold: 0.5     # error rate above which a candidate is deprioritized
  error_decay_secs: 300    # time window for error rate calculation; old errors age out naturally
  connect_timeout_secs: 10 # max seconds to establish upstream connection
  read_timeout_secs: 60    # max seconds between chunks before treating upstream as hung
